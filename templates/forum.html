<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <title>Forum - VulnForum</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <nav>
        <h2>VulnForum</h2>
        <a href="/">Home</a>
        <a href="/forum">Forum</a>
        <a href="/login">Login</a>
        <a href="/register">Registrieren</a>
        <a href="/upload">Upload</a>
    </nav>

    <main class="container">
        <section class="card wide">
            <h1>Forum</h1>
            <p>Hier können Nutzer Beiträge erstellen und lesen.</p>

            <form method="POST">
                <input type="text" name="title" placeholder="Titel des Beitrags" required>
                <textarea name="content" placeholder="Schreibe deinen Beitrag..." required></textarea>
                <button type="submit">Beitrag veröffentlichen</button>
            </form>
        </section>

        <section class="card wide">
            <h2>Beispieleinträge</h2>

            <article class="post">
                <h3>Willkommen im Forum</h3>
                <p>Dies ist ein Beispielbeitrag.</p>
                <a href="/profile/1">Autor ansehen</a>
            </article>

            <article class="post">
                <h3>IT-Sicherheit Projekt</h3>
                <p>Hier werden später absichtlich unsichere Inhalte angezeigt.</p>
                <a href="/profile/2">Autor ansehen</a>
            </article>
        </section>
    </main>
</body>
</html>
